<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Konklave Grid</title>

<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  background: #efefef;
  text-align: center;
}

h1 {
  margin: 20px;
  font-size: 40px;
}

/* GRID wie im Bild */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 110px);
  gap: 14px;
  justify-content: center;
}

/* KACHEL */
.card {
  width: 110px;
  background: white;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

/* BILD */
.card img {
  width: 100%;
  height: 85px;
  object-fit: cover;
}

/* INFO BALKEN */
.info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 10px;
  color: white;
  padding: 3px 4px;
  font-weight: bold;
}

.flag {
  width: 16px;
  height: 10px;
}

/* NAME */
.name {
  font-size: 12px;
  font-weight: bold;
  padding: 6px 4px 2px;
}

/* STIMMEN */
.votes {
  font-size: 11px;
  color: #444;
  padding-bottom: 6px;
}

/* FARBEN exakt */
.erz { background: #0b3d91; }
.tra { background: #1f5fd1; }
.kon { background: #6fa8ff; }
.mod { background: #f1c40f; color: black; }
.ref { background: #ff6b6b; }
.lib { background: #e60000; }
.pro { background: #8b0000; }

/* INPUT */
input, select, button {
  margin: 4px;
  padding: 6px;
  font-size: 12px;
}
</style>

</head>
<body>

<h1 id="yearDisplay">2026</h1>

<div>
  <input id="name" placeholder="Name">
  <input id="age" type="number" placeholder="Alter">
  <input id="votes" type="number" placeholder="Stimmen">
  <input id="country" placeholder="de, it, us">

  <select id="scale">
    <option value="erz">ERZ</option>
    <option value="tra">TRA</option>
    <option value="kon">KON</option>
    <option value="mod">MOD</option>
    <option value="ref">REF</option>
    <option value="lib">LIB</option>
    <option value="pro">PRO</option>
  </select>

  <input type="file" id="image">
  <button onclick="add()">+</button>
</div>

<br>

<div class="grid" id="grid"></div>

<script>
let count = 0;

function add() {
  if (count >= 10) {
    alert("Maximal 10 Kandidaten");
    return;
  }

  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;
  const votes = document.getElementById("votes").value;
  const country = document.getElementById("country").value.toLowerCase();
  const scale = document.getElementById("scale").value;
  const image = document.getElementById("image").files[0];

  if (!image) return alert("Bild fehlt");

  const reader = new FileReader();

  reader.onload = function(e) {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${e.target.result}">
      <div class="info ${scale}">
        <img class="flag" src="https://flagcdn.com/w20/${country}.png">
        <span>${age}</span>
        <span>${scale.toUpperCase()}</span>
      </div>
      <div class="name">${name}</div>
      <div class="votes">${votes} Stimmen</div>
    `;

    document.getElementById("grid").appendChild(card);
    count++;
  }

  reader.readAsDataURL(image);
}
</script>

</body>
</html>
